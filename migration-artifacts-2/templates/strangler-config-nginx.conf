# Strangler-fig routing — {{DOMAIN}}
# Generated by sub-agents/06-strangler-fig/routing-config.md
# Replace {{...}} placeholders. Reload with: nginx -t && nginx -s reload

upstream {{DOMAIN}}_legacy {
    server {{LEGACY_HOST}}:{{LEGACY_PORT}} max_fails=3 fail_timeout=10s;
    keepalive 64;
}

upstream {{DOMAIN}}_new {
    server {{NEW_HOST}}:{{NEW_PORT}} max_fails=3 fail_timeout=10s;
    keepalive 64;
}

# Sticky-by-user split. Hashes user_id so a single user does not flip
# between legacy and new mid-session. Falls back to remote_addr if user_id absent.
split_clients "${cookie_user_id}${remote_addr}" $route_{{DOMAIN}} {
    {{RAMP_PERCENT}}%    new;
    *                    legacy;
}

# Kill-switch via internal-only header injected by an auth/edge layer.
# When X-Kill-Switch-{{DOMAIN}}: 1 is present, force legacy.
map $http_x_kill_switch_{{DOMAIN}} $route_final_{{DOMAIN}} {
    "1"     legacy;
    default $route_{{DOMAIN}};
}

map $route_final_{{DOMAIN}} $upstream_{{DOMAIN}} {
    new     {{DOMAIN}}_new;
    legacy  {{DOMAIN}}_legacy;
    default {{DOMAIN}}_legacy;
}

server {
    listen 80;
    server_name {{HOSTNAME}};

    # Common headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Migration-Route $route_final_{{DOMAIN}};

    # Connection tuning for circuit-breaker-friendly behavior
    proxy_connect_timeout 2s;
    proxy_send_timeout    5s;
    proxy_read_timeout    5s;
    proxy_next_upstream   error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;

    location /api/{{DOMAIN}}/ {
        proxy_pass http://$upstream_{{DOMAIN}};

        # Log the routing decision for diff/canary analysis
        access_log /var/log/nginx/{{DOMAIN}}-route.log combined;
    }

    # Health check passthroughs — always to legacy until decommission
    location = /api/{{DOMAIN}}/health {
        proxy_pass http://{{DOMAIN}}_legacy;
    }
}
